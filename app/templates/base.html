<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}{{ (page.meta_description if page else '') or 'SuloSethuSolution — software development, professional training, and industry-focused internships.' }}{% endblock %}" />
  <title>{% block title %}{{ (page.meta_title if page else '') or 'SuloSethuSolution' }}{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/styles.css?v=4" />
  <link rel="stylesheet" href="/static/css/themes.css?v=3" />
  <script>
    (function () { try { if (localStorage.getItem('ss-mode') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch (e) {} })();
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader-core"><div class="loader-ring"></div><div class="loader-mark">{{ site.brand.mark }}</div></div>
    <div class="loader-text">Loading experience…</div>
  </div>

  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  {% include "partials/nav.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="/static/js/scroll.js?v=1"></script>
  <script src="/static/js/canvas.js?v=2"></script>
  <script src="/static/js/main.js?v=3"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
